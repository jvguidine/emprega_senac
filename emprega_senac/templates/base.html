<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EmpregaSenac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">EmpregaSenac</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">

        
        <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="/candidatar/nova/">Nova Candidatura</a></li>
        <li class="nav-item"><a class="nav-link" href="/candidatar/lista/">Ver Candidaturas</a></li>

        {% if user.is_authenticated %}
          
          <li class="nav-item"><a class="nav-link" href="/vagas/nova/">Cadastrar Vaga</a></li>

          
          <li class="nav-item">
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-link nav-link" style="padding: 0; margin-left: 10px;">Sair</button>
            </form>
          </li>
        {% else %}
          
          <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
