<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EmpregaSenac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">EmpregaSenac</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto d-flex flex-wrap gap-2">

        
        <li class="nav-item">
          <a class="btn btn-primary" href="/">🏠 Início</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-primary" href="/candidatar/nova/">➕ Nova Candidatura</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-primary" href="/candidatar/lista/">📋 Ver Candidaturas</a>
        </li>

        {% if user.is_authenticated %}
        
          <li class="nav-item">
            <a class="btn btn-success" href="/vagas/nova/">📢 Cadastrar Vaga</a>
          </li>
          <li class="nav-item">
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-danger">🚪 Sair</button>
            </form>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="btn btn-warning" href="{% url 'login' %}">🔐 Login</a>
          </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
